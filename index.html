<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Report</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f6f6ef; color: #333; font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 14px; line-height: 1.6; max-width: 780px; margin: 0 auto; padding: 16px; }
header { border-bottom: 2px solid #ff6600; padding: 8px 0 12px; margin-bottom: 24px; }
header h1 { font-size: 18px; color: #ff6600; font-weight: bold; }
header h1 a { color: #ff6600; text-decoration: none; }
.date-group { margin-bottom: 32px; }
.date-header { font-size: 15px; font-weight: bold; color: #828282; margin-bottom: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
.report { margin-bottom: 24px; }
.report-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
.highlight { color: #000; font-weight: bold; margin-bottom: 8px; }
.indices { white-space: pre-wrap; color: #555; margin-bottom: 8px; font-size: 13px; }
.items { list-style: none; padding: 0; }
.items li { padding: 2px 0; }
.items li::before { content: "▸ "; color: #ff6600; }
.section-title { font-weight: bold; margin-top: 10px; margin-bottom: 4px; color: #555; }
.watchpoints { margin-top: 8px; color: #828282; font-size: 13px; }
.watchpoints li::before { content: "👀 "; }
.community { margin-top: 8px; }
.community li::before { content: "💬 "; color: #828282; }
.loading { color: #828282; padding: 20px 0; }
footer { border-top: 1px solid #ccc; padding-top: 8px; margin-top: 32px; color: #828282; font-size: 12px; }
@media (max-width: 600px) { body { font-size: 13px; padding: 12px; } }
</style>
</head>
<body>
<header><h1><a href="/">Daily Report</a></h1></header>
<main id="content"><p class="loading">Loading...</p></main>
<footer>daily-report — static feed</footer>
<script>
(async () => {
  const main = document.getElementById('content');
  try {
    const idx = await (await fetch('reports/index.json')).json();
    const dates = [...idx].sort().reverse();
    let html = '';
    for (const date of dates) {
      const data = await (await fetch(`reports/${date}.json`)).json();
      html += `<div class="date-group"><div class="date-header">${data.date}</div>`;
      for (const r of data.reports) {
        html += `<div class="report"><div class="report-title">${r.emoji} ${r.title}</div>`;
        html += `<div class="highlight">${r.highlight}</div>`;
        if (r.indices) html += `<div class="indices">${r.indices}</div>`;
        if (r.items) html += `<ul class="items">${r.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
        if (r.sections) {
          for (const [k, v] of Object.entries(r.sections)) {
            html += `<div class="section-title">${k}</div><ul class="items">${v.map(i => `<li>${i}</li>`).join('')}</ul>`;
          }
        }
        if (r.watchpoints) html += `<ul class="items watchpoints">${r.watchpoints.map(i => `<li>${i}</li>`).join('')}</ul>`;
        if (r.community) html += `<ul class="items community">${r.community.map(i => `<li>${i}</li>`).join('')}</ul>`;
        html += '</div>';
      }
      html += '</div>';
    }
    main.innerHTML = html;
  } catch (e) { main.innerHTML = '<p>Failed to load reports.</p>'; }
})();
</script>
</body>
</html>
